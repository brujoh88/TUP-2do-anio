<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Iniciar Sesion</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <main class="login-container">
        <div class="login-card">
            <h1 class="login-title">Food Store</h1>
            <p class="login-subtitle">Iniciar Sesion</p>

            <form action="#" method="post">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contrasena:</label>
                    <input type="password" id="password" name="password" placeholder="Minimo 8 caracteres" required>
                </div>

                <button type="submit" class="btn-login">Ingresar</button>
            </form>

            <p class="login-register">No tenes cuenta? <a href="#">Registrate aca</a></p>
        </div>
    </main>

</body>
</html>
